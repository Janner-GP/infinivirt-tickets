services:
  postgres:
    image: postgres:16-alpine
    container_name: infinivirt_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - infinivirt_postgres_data:/var/lib/postgresql/data

    healthcheck:
      # $$ (no $) para que la variable la resuelva el shell DENTRO del
      # contenedor en cada chequeo, no docker compose al leer este archivo.
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: infinivirt_backend

    build:
      context: ./backend
      dockerfile: Dockerfile

    image: infinivirt-backend:latest

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      NODE_ENV: production
      PORT: 3000

      DB_HOST: postgres
      DB_PORT: 5432

      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}

      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}

    ports:
      - "3000:3000"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  frontend:
    container_name: infinivirt_frontend

    build:
      context: ./frontend
      dockerfile: Dockerfile

    image: infinivirt-frontend:latest

    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "80:80"

volumes:
  infinivirt_postgres_data:
